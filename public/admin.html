<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Chat</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="brand">Bet<span>Pro</span> Admin</div>
      <nav><a href="/">Back to site</a></nav>
    </header>

    <section class="section">
      <h2>Admin Live Chat</h2>
      <p class="muted">Select a visitor and send messages.</p>

      <div class="grid" style="grid-template-columns: 1fr 2fr;">
        <div class="card">
          <h3>Visitors</h3>
          <div id="visitors"></div>
        </div>

        <div class="card">
          <h3 id="activeTitle">No visitor selected</h3>
          <div id="adminMessages" class="chat-messages" style="height: 360px; background: transparent; border:1px solid rgba(255,255,255,.12); border-radius:16px;"></div>

          <form id="adminForm" class="chat-form">
            <input id="adminInput" placeholder="Type to reply..." autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </div>
      </div>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="assets/js/admin-chat.js"></script>
  </body>
</html>
